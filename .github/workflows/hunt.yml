name: meme-hunt

# Runs the hunter in the cloud on a schedule — nothing on your local machine.
# Every 30 min (GitHub crons can be delayed a few min under load). This is a
# "here's what's hot, go look" cadence; tighten to "*/10 * * * *" if you want
# to catch fresher launches.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}          # lets you trigger a run manually from the Actions tab

# Serialize runs so two crons never race on the shared state cache.
concurrency:
  group: meme-hunt
  cancel-in-progress: false

# contents:write — the run commits feed/signals.json back to the repo (the web
# console reads it from raw.githubusercontent.com; git is the database).
permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      # Rolling state: restore the newest saved state.json, save a fresh one at
      # job end (unique key => always saves). Best-effort de-dup across runs.
      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: state.json
          key: meme-hunt-state-${{ github.run_id }}
          restore-keys: |
            meme-hunt-state-

      - name: Hunt (one cycle)
        env:
          MH_TG_TOKEN: ${{ secrets.MH_TG_TOKEN }}
          MH_TG_CHAT_ID: ${{ secrets.MH_TG_CHAT_ID }}
          # tuning — override defaults here without touching code
          MH_MAX_AGE_MIN: "240"
          MH_TIER_HOT: "78"
          MH_TIER_ALERT: "60"
          MH_MIN_LIQ: "4000"
          # first-run flood guard aligned to the 30-min cadence
          MH_COLD_START_AGE_MIN: "35"
        run: python -m memehunter cloud

      # Publish the web signal feed. generated_at changes every cycle, so this
      # commits every run (~48/day) — accepted machine-commit noise; the commit
      # history doubles as a cron-liveness audit trail. Push failure must not
      # fail the job: the next run rewrites the feed from scratch anyway.
      - name: Publish signal feed
        if: ${{ !cancelled() }}
        run: |
          git config user.name "meme-hunter-cron"
          git config user.email "mobius0083x@gmail.com"
          git add feed/
          if git diff --cached --quiet; then
            echo "feed: no changes"
          else
            git commit -m "feed: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push origin main || echo "::warning::feed push failed (next run retries)"
          fi
